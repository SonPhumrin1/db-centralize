# Docker Compose stack definition for DataPlatform local development.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dataplatform
      POSTGRES_USER: dp
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  backend:
    build: ./backend
    environment:
      - BOOTSTRAP_ROOT_USERNAME=${BOOTSTRAP_ROOT_USERNAME}
      - BOOTSTRAP_ROOT_PASSWORD=${BOOTSTRAP_ROOT_PASSWORD}
      - APP_URL=${APP_URL}
      - PORT=${PORT:-8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend

volumes:
  pgdata:
